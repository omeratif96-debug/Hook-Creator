openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: hooks
    description: Hook generation operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /hooks/generate:
    post:
      operationId: generateHooks
      tags: [hooks]
      summary: Generate viral hooks
      description: Generate 15 viral hooks for a given topic and platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateHooksRequest"
      responses:
        "200":
          description: Successfully generated hooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateHooksResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Submit an email to join the premium waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinWaitlistRequest"
      responses:
        "200":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinWaitlistResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateHooksRequest:
      type: object
      properties:
        topic:
          type: string
          description: The video topic or idea
        platform:
          type: string
          enum: [YouTube, TikTok, Instagram]
          description: The target platform
      required:
        - topic
        - platform
    GenerateHooksResponse:
      type: object
      properties:
        hooks:
          type: array
          items:
            type: string
          description: List of 15 generated hooks
        platform:
          type: string
        topic:
          type: string
      required:
        - hooks
        - platform
        - topic
    JoinWaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    JoinWaitlistResponse:
      type: object
      properties:
        message:
          type: string
        alreadyJoined:
          type: boolean
      required:
        - message
        - alreadyJoined
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
