openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: hooks
    description: Hook generation operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /hooks/generate:
    post:
      operationId: generateHooks
      tags: [hooks]
      summary: Generate viral hooks, titles, and intro scripts
      description: Generate content for a given topic, platform, and content angle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateHooksRequest"
      responses:
        "200":
          description: Successfully generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateHooksResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /hooks/remix:
    post:
      operationId: remixHook
      tags: [hooks]
      summary: Remix a single hook into variations
      description: Generate 10 variations of a given hook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemixHookRequest"
      responses:
        "200":
          description: Successfully generated variations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemixHookResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Submit an email to join the premium waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinWaitlistRequest"
      responses:
        "200":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinWaitlistResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateHooksRequest:
      type: object
      properties:
        topic:
          type: string
          description: The video topic or idea
        platform:
          type: string
          enum: [YouTube, TikTok, Instagram]
          description: The target platform
        contentAngle:
          type: string
          enum: [Educational, Storytelling, Controversial, Review, Comparison, Listicle, Inspirational]
          description: The content angle or style
      required:
        - topic
        - platform
        - contentAngle
    GenerateHooksResponse:
      type: object
      properties:
        hooks:
          type: array
          items:
            type: string
          description: 10 viral hooks
        titles:
          type: array
          items:
            type: string
          description: 10 clickable titles
        introScripts:
          type: array
          items:
            type: string
          description: 5 intro script openers
        platform:
          type: string
        topic:
          type: string
        contentAngle:
          type: string
      required:
        - hooks
        - titles
        - introScripts
        - platform
        - topic
        - contentAngle
    RemixHookRequest:
      type: object
      properties:
        hook:
          type: string
          description: The hook to remix
        topic:
          type: string
        platform:
          type: string
          enum: [YouTube, TikTok, Instagram]
        contentAngle:
          type: string
          enum: [Educational, Storytelling, Controversial, Review, Comparison, Listicle, Inspirational]
      required:
        - hook
        - topic
        - platform
        - contentAngle
    RemixHookResponse:
      type: object
      properties:
        variations:
          type: array
          items:
            type: string
          description: 10 remixed variations of the original hook
      required:
        - variations
    JoinWaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    JoinWaitlistResponse:
      type: object
      properties:
        message:
          type: string
        alreadyJoined:
          type: boolean
      required:
        - message
        - alreadyJoined
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
